<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Release Download</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            background: #0d1117;
            color: #c9d1d9;
        }
        .release-box {
            border: 1px solid #30363d;
            border-radius: 6px;
            padding: 24px;
            background: #161b22;
        }
        h1 { color: #f0f6fc; margin-top: 0; }
        .asset {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px;
            margin: 10px 0;
            background: #21262d;
            border-radius: 6px;
            border: 1px solid #30363d;
        }
        .checkbox-wrapper {
            margin: 20px 0;
            padding: 12px;
            background: rgba(187, 128, 9, 0.15);
            border: 1px solid rgba(187, 128, 9, 0.4);
            border-radius: 6px;
        }
        input[type="checkbox"] { margin-right: 8px; }
        button {
            padding: 6px 16px;
            background: #238636;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
        }
        button:disabled {
            background: #30363d;
            color: #8b949e;
            cursor: not-allowed;
        }
        a { color: #58a6ff; text-decoration: none; }
    </style>
</head>
<body>
    <div class="release-box">
        <h1>📦 《伊甸园》 Release v1.0.0</h1>
        <p>发布日期: 2025-03-06</p>
        
<div class="checkbox-wrapper">
    <label style="display: flex; align-items: flex-start; gap: 8px;">
        <input type="checkbox" id="agreeCheck" onchange="toggleDownload()" style="margin-top: 4px;">
        <div>
            <strong>⚠️ 预警：请仔细阅读以下内容</strong>
		<div style="margin-top: 8px; font-size: 16px; line-height: 1.6; background: rgba(0,0,0,0.2); padding: 10px; border-radius: 4px;">
 本游戏为《苏丹的游戏》同人，CP属性为阿尔图x奈费勒。由于贡献者众多、且大家的个性迥异，游玩过程中可能会出现风格突变的情况！
            </div>



        </div>
    </label>
</div>
        <div class="asset">
            <div>
                <span class="version-icon">🍎</span>
                <strong>Mac 版本</strong> 
            </div>
            <button class="download-btn" disabled onclick="downloadFile('mac')">
                下载
            </button>
        </div>

        <div class="asset">
            <div>
                <span class="version-icon">🪟</span>
                <strong>Windows 版本</strong> 
            </div>
            <button class="download-btn" disabled onclick="downloadFile('win')">
                下载
            </button>
        </div>

        <div class="asset">
            <div>
                <span class="version-icon">🤖</span>
                <strong>Android 版本</strong> 
            </div>
            <button class="download-btn" disabled onclick="downloadFile('android')">
                下载
            </button>
        </div>
    </div>

    <script>
        // 下载链接配置
        const downloadLinks = {
            mac: 'https://github.com/limoer2999/eden_release/releases/download/v1.0.0/eden-2.0_20260306-mac.zip',
            win: 'https://github.com/limoer2999/eden_release/releases/download/v1.0.0/eden-2.0_20260306-win.zip',
            android: 'https://github.com/limoer2999/eden_release/releases/download/v1.0.0/com.arzu_nawfal.eden-20260306-release.apk'
        };

        function toggleDownload() {
            const checked = document.getElementById('agreeCheck').checked;
            // 批量启用/禁用所有下载按钮
            document.querySelectorAll('.download-btn').forEach(btn => {
                btn.disabled = !checked;
            });
        }

        function downloadFile(platform) {
            const url = downloadLinks[platform];
            if (url) {
                window.location.href = url;
            }
        }
    </script>
</body>
</html>
